{% extends 'patient/base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block header %}Forgot Your Password?{% endblock %}

{% block content %}
  <div class="card" style="max-width:420px;margin:auto;">
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    {% if s_msg %}
      <div class="alert alert-success">{{ s_msg }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="email" style="display:block;margin-bottom:0.5rem;">Enter your email address:</label>
      <input type="email" name="email" id="email" required placeholder="you@example.com"
             style="width:100%;padding:0.75rem;border:1px solid #E5E7EB;border-radius:0.5rem;margin-bottom:1rem;"/>
      <button type="submit" class="btn" style="width:100%;background:linear-gradient(135deg, #4F46E5, #7C3AED);color:white;border:none;padding:0.875rem;border-radius:9999px;">Send Reset Link</button>
    </form>
    <p style="text-align:center;margin-top:1rem;">
      <a href="{% url 'login' %}">Back to login</a>
    </p>
  </div>
{% endblock %}

{% extends 'patient/base.html' %}
{% block title %}Reset Password – DoctorFinder{% endblock %}
{% block header %}Reset Your Password{% endblock %}

{% block content %}
  <div class="card" style="max-width:420px;margin:auto;">
    {% if error %}
      <div class="alert alert-danger" style="background:#FEE2E2; color:#991B1B; padding:0.75rem; border-radius:0.5rem; margin-bottom:1rem; border:1px solid #FECACA;">⚠️ {{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'password_reset_confirm' user_id=user_id token=token %}">
      {% csrf_token %}
      
      <div class="form-group" style="margin-bottom:1rem;">
        <label for="password" style="display:block;margin-bottom:0.5rem;font-weight:600;">New Password:</label>
        <input type="password" name="password" id="password" required placeholder="Choose a strong password"
               style="width:100%;padding:0.75rem;border:1px solid #E5E7EB;border-radius:0.5rem;box-sizing:border-box;" autocomplete="new-password"/>
      </div>
      
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="confirm_password" style="display:block;margin-bottom:0.5rem;font-weight:600;">Confirm New Password:</label>
        <input type="password" name="confirm_password" id="confirm_password" required placeholder="Confirm your password"
               style="width:100%;padding:0.75rem;border:1px solid #E5E7EB;border-radius:0.5rem;box-sizing:border-box;" autocomplete="new-password"/>
      </div>
      
      <button type="submit" class="btn" style="width:100%;background:linear-gradient(135deg, #4F46E5, #7C3AED);color:white;border:none;padding:0.875rem;border-radius:9999px;font-weight:700;cursor:pointer;">Reset Password</button>
    </form>
  </div>
{% endblock %}
